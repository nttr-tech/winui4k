name: Build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (for building; the foojay resolver auto-downloads JDK 8/9/22 for testing)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install the Windows App SDK runtime
        run: |
          ./gradlew :winui4k:downloadInstallers
          $process = Start-Process -FilePath "winui4k/installer/WindowsAppRuntimeInstall-x64.exe" -ArgumentList '--quiet', '--force' -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            Write-Error "Failed to install the Windows App SDK runtime (exit code: $($process.ExitCode))"
            exit $process.ExitCode
          }

      - name: Build (JDK 25) and test (JDK 8 / 9 / 22 / 25)
        run: ./gradlew build testOnAllJavaVersions

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-x64
          path: winui4k/build/reports/tests/

  build-arm64:
    # The free windows-11-arm runner is only available to public repositories, so skip this job
    # while the repository is private (otherwise it would wait for a runner and fail with a timeout;
    # it runs automatically once the repository becomes public)
    if: ${{ !github.event.repository.private }}
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Microsoft Build of OpenJDK because Temurin does not distribute JDK 25 for Windows aarch64)
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install the Windows App SDK runtime
        run: |
          ./gradlew :winui4k:downloadInstallers
          $process = Start-Process -FilePath "winui4k/installer/WindowsAppRuntimeInstall-arm64.exe" -ArgumentList '--quiet', '--force' -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            Write-Error "Failed to install the Windows App SDK runtime (exit code: $($process.ExitCode))"
            exit $process.ExitCode
          }

      - name: Build (JDK 25) and test (JDK 25 only; JDK 8 / 9 have no Windows aarch64 builds)
        run: ./gradlew build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-arm64
          path: winui4k/build/reports/tests/
